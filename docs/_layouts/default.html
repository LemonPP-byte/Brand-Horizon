<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <!-- Navigation -->
    <nav class="main-nav">
        <div class="container">
            <div class="logo">Brand Sites</div>
            <div class="nav-links">
                <a href="{{ '/' | relative_url }}">Home</a>
                <a href="{{ '/' | relative_url }}#archive">Archive</a>
            </div>
        </div>
    </nav>

    <!-- Post Content -->
    <article class="post-content">
        <div class="container">
            <header class="post-header">
                <h1>{{ page.title }}</h1>
                <p class="post-date">{{ page.date | date: "%B %d, %Y" }}</p>
            </header>

            <div class="post-body brands-preview" id="post-brands-container">
                {{ content }}
            </div>

            <footer class="post-footer">
                <a href="{{ '/' | relative_url }}" class="back-link">← Back to Home</a>
            </footer>
        </div>
    </article>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const brandsContainer = document.getElementById('post-brands-container');
            if (!brandsContainer) return;

            // Find all h2 elements (brand titles)
            const brandTitles = brandsContainer.querySelectorAll('h2');

            brandTitles.forEach(function(title) {
                // Wrap content after h2 until next h2
                const detailContent = document.createElement('div');
                detailContent.className = 'brand-detail-content';

                let nextElement = title.nextElementSibling;
                const elementsToWrap = [];

                while (nextElement && nextElement.tagName !== 'H2') {
                    elementsToWrap.push(nextElement);
                    nextElement = nextElement.nextElementSibling;
                }

                elementsToWrap.forEach(function(el) {
                    detailContent.appendChild(el);
                });

                title.parentNode.insertBefore(detailContent, title.nextSibling);

                // Add click handler
                title.addEventListener('click', function(e) {
                    if (e.target.tagName === 'A') return; // Don't toggle if clicking link

                    this.classList.toggle('expanded');
                    detailContent.classList.toggle('expanded');
                });
            });
        });
    </script>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Brand Sites. Powered by AI.</p>
        </div>
    </footer>
</body>
</html>
