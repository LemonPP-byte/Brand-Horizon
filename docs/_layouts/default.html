<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <!-- Navigation -->
    <nav class="main-nav">
        <div class="container">
            <div class="logo">Brand Sites</div>
            <div class="nav-links">
                <a href="{{ '/' | relative_url }}">Home</a>
                <a href="{{ '/' | relative_url }}#archive">Archive</a>
            </div>
        </div>
    </nav>

    <!-- Post Content -->
    <article class="post-content">
        <div class="container">
            <header class="post-header">
                <h1>{{ page.title }}</h1>
                <p class="post-date">{{ page.date | date: "%B %d, %Y" }}</p>
            </header>

            <div class="post-body">
                {{ content }}
            </div>

            <footer class="post-footer">
                <a href="{{ '/' | relative_url }}" class="back-link">← Back to Home</a>
            </footer>
        </div>
    </article>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Brand Sites. Powered by AI.</p>
        </div>
    </footer>
</body>
</html>
